<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Piłkarzyki na kartce</title>
<meta name="theme-color" content="#2e4a7d">
<meta name="description" content="Piłkarzyki na kartce — klasyczna gra papierowa. Graj z botem lub we dwoje.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Piłkarzyki">
<script src="i18n.js"></script>
<script src="storage.js"></script>
<style>
  :root{
    --paper:#FBF8EC;
    --grid:#cfe0ef;
    --margin:#d9594e;
    --ink:#2e4a7d;
    --ink2:#b5532a;
    --ball:#e8732a;
    --ball-ring:#a84718;
    --good:#2ea05a;
    --dot:#9fb3cf;
    --text:#23324f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:#eef1f5;color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif}
  .wrap{max-width:580px;margin:0 auto;padding:8px 10px 24px}

  /* TOP BAR — kompaktowy pasek u góry */
  .topbar{display:flex;align-items:center;gap:6px;padding:4px 2px 8px;position:relative}
  .brand{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:.2px;
    margin-right:auto;display:flex;align-items:center;gap:5px;white-space:nowrap}
  .icon-btn{border:1px solid #d4dae6;background:#fff;color:var(--ink);
    width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px;font-weight:700;
    display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:1}
  .icon-btn:active{transform:translateY(1px)}
  .icon-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .icon-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* SETTINGS POP — chowa się dopóki użytkownik nie chce zmienić ustawień */
  .settings-pop{position:absolute;top:46px;right:0;background:#fff;border:1px solid #d4dae6;
    border-radius:12px;padding:12px;min-width:240px;box-shadow:0 8px 24px rgba(20,30,60,.18);
    z-index:30;display:none}
  .settings-pop.open{display:block}
  .settings-pop .lbl-small{display:block;font-size:11px;color:#6b7a96;font-weight:700;
    text-transform:uppercase;letter-spacing:.6px;margin:0 0 5px}
  .settings-pop .seg-group+.seg-group{margin-top:10px}

  /* STATUS — jednolinijkowy: kropka • tura • wynik */
  .status{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;
    padding:8px 10px;border-radius:10px;background:#fff;border:1px solid #e2e7ef;margin-bottom:8px}
  .chip{width:12px;height:12px;border-radius:50%;flex:0 0 auto;border:2px solid #fff;box-shadow:0 0 0 1px #ccc}
  #turnText{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .score-inline{display:inline-flex;align-items:center;gap:0;font-weight:800;
    background:#f3f5f9;padding:3px 8px;border-radius:8px;font-size:14px;white-space:nowrap}
  .score-inline .s1{color:var(--ink)}
  .score-inline .s2{color:var(--ink2)}
  .score-inline .sp{color:#9fb3cf;padding:0 4px}
  .bounce{font-size:11px;color:var(--ball-ring);font-weight:700;opacity:0;transition:opacity .2s;
    background:#fff3eb;padding:2px 6px;border-radius:6px;white-space:nowrap}
  .bounce.show{opacity:1}

  .seg{display:inline-flex;background:#eef1f6;border-radius:10px;padding:3px;gap:3px;width:100%}
  .seg button{border:0;background:transparent;padding:7px 10px;border-radius:8px;
    font-size:13px;font-weight:600;color:#4a5a78;cursor:pointer;flex:1}
  .seg button.on{background:var(--ink);color:#fff}

  .btn{border:1px solid #d4dae6;background:#fff;color:var(--ink);font-weight:600;
    font-size:13px;padding:8px 13px;border-radius:10px;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}

  .banner{display:none;margin-top:10px;padding:12px;border-radius:12px;text-align:center;
    font-weight:700;font-size:16px}
  .banner.win1{display:block;background:#e9f2ff;color:var(--ink);border:1px solid #bcd3f3}
  .banner.win2{display:block;background:#fdeee6;color:var(--ink2);border:1px solid #f3cbb4}
  .board{width:100%;background:var(--paper);border:1px solid #e6dfc6;border-radius:12px;display:block}
  .target-ring{fill:rgba(46,160,90,.18);stroke:var(--good);stroke-width:2.2;pointer-events:none;
    animation:pulse 1.15s ease-in-out infinite}
  .hit{fill:transparent;cursor:pointer}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.target-ring{animation:none;opacity:.8}}
  .panel{background:#fff;border:1px solid #e2e7ef;border-radius:14px;
    padding:12px;margin-top:10px;box-shadow:0 1px 2px rgba(20,40,80,.05)}
  details{font-size:13.5px;line-height:1.5}
  details summary{cursor:pointer;font-weight:700;color:var(--ink);outline:none}
  details p{margin:8px 0 0}
  .foot{font-size:11px;color:#7a89a3;margin-top:14px;line-height:1.4;text-align:center}
  .modal{position:fixed;inset:0;background:rgba(20,30,50,.45);display:flex;align-items:center;
    justify-content:center;padding:18px;z-index:50;animation:fade .18s ease-out}
  .modal[hidden]{display:none}
  .modal-card{background:#fff;border-radius:16px;max-width:380px;width:100%;padding:22px 22px 18px;
    box-shadow:0 14px 40px rgba(20,30,60,.22);text-align:center;animation:pop .22s ease-out}
  .modal-trophy{font-size:46px;line-height:1}
  .modal-title{font-size:22px;font-weight:800;color:var(--ink);margin:6px 0 2px}
  .modal-sub{font-size:14px;color:#5b6b85;margin-bottom:14px}
  .modal-score{font-size:18px;font-weight:700;margin-bottom:16px}
  .modal-score b{font-size:24px;color:var(--ink)}
  .modal-actions{display:flex;gap:8px;justify-content:center}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  /* language switcher w dropdownie ustawień */
  .lang-seg{display:inline-flex;background:#eef1f6;border-radius:10px;padding:3px;gap:3px;width:100%}
  .lang-seg button{border:0;background:transparent;padding:7px 10px;border-radius:8px;
    font-size:12px;font-weight:700;color:#4a5a78;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;flex:1}
  .lang-seg button.on{background:var(--ink);color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">⚽ <span data-i18n="app.title">Piłkarzyki</span></div>
    <button class="icon-btn primary" id="newBtn" data-i18n-attr-title="actions.newGame" data-i18n-attr-aria-label="actions.newGame" title="Nowa gra" aria-label="Nowa gra">↻</button>
    <button class="icon-btn" id="undoBtn" data-i18n-attr-title="actions.undo" data-i18n-attr-aria-label="actions.undo" title="Cofnij" aria-label="Cofnij">↶</button>
    <button class="icon-btn" id="settingsBtn" data-i18n-attr-aria-label="settings.title" aria-label="Ustawienia" aria-expanded="false">⚙</button>
    <div class="settings-pop" id="settingsPop" role="menu">
      <div class="seg-group">
        <span class="lbl-small" data-i18n="settings.mode">Tryb</span>
        <div class="seg" id="modeSeg">
          <button data-mode="bot" class="on" data-i18n="settings.modeBot">Z botem</button>
          <button data-mode="2p" data-i18n="settings.mode2p">2 graczy</button>
        </div>
      </div>
      <div class="seg-group" id="diffGroup">
        <span class="lbl-small" id="diffLbl" data-i18n="settings.level">Poziom bota</span>
        <div class="seg" id="diffSeg">
          <button data-diff="easy" data-i18n="settings.levelEasy">Łatwy</button>
          <button data-diff="medium" class="on" data-i18n="settings.levelMedium">Średni</button>
          <button data-diff="hard" data-i18n="settings.levelHard">Trudny</button>
        </div>
      </div>
      <div class="seg-group">
        <span class="lbl-small" data-i18n="settings.language">Język</span>
        <div class="lang-seg" id="langSeg">
          <button data-lang="pl">PL</button>
          <button data-lang="en">EN</button>
          <button data-lang="de">DE</button>
        </div>
      </div>
      <div class="seg-group">
        <span class="lbl-small" data-i18n="settings.totalScore">Wynik łączny</span>
        <button class="btn" id="scoreReset" style="width:100%">↺ <span data-i18n="actions.resetScore">Wyzeruj wynik</span></button>
      </div>
    </div>
  </div>

  <div class="status">
    <span class="chip" id="turnChip"></span>
    <span id="turnText">—</span>
    <span class="bounce" id="bounceTag" data-i18n="status.bounceShort">🔁 Odbicie!</span>
    <span class="score-inline" id="scorePanel">
      <span class="s1" id="score1">0</span><span class="sp">:</span><span class="s2" id="score2">0</span>
    </span>
  </div>

  <svg id="board" class="board" xmlns="http://www.w3.org/2000/svg"></svg>

  <div class="banner" id="banner"></div>

  <div class="modal" id="endModal" hidden>
    <div class="modal-card">
      <div class="modal-trophy" id="endTrophy">🏆</div>
      <div class="modal-title" id="endTitle">—</div>
      <div class="modal-sub" id="endSub">—</div>
      <div class="modal-score">
        <span><span id="endLbl1">Ty</span>: <b id="endScore1">0</b></span>
        <span class="score-sep">—</span>
        <span><b id="endScore2">0</b> :<span id="endLbl2">Bot</span></span>
      </div>
      <div class="modal-actions">
        <button class="btn primary" id="endRematch" data-i18n="actions.rematch">Rewanż</button>
        <button class="btn" id="endClose" data-i18n="actions.close">Zamknij</button>
      </div>
    </div>
  </div>

  <div class="panel" id="privacyPanel" style="margin-top:12px;display:none">
    <button class="btn" id="privacyBtn" style="width:100%" data-i18n="actions.privacy">Ustawienia prywatności (zgoda na reklamy)</button>
  </div>

  <div class="panel" style="margin-top:12px">
    <details>
      <summary data-i18n="rules.title">Zasady</summary>
      <p data-i18n-html="rules.rule1"></p>
      <p data-i18n-html="rules.rule2"></p>
      <p data-i18n-html="rules.rule3"></p>
      <p data-i18n-html="rules.rule4"></p>
      <p style="color:#6b7a96" data-i18n-html="rules.intro"></p>
    </details>
  </div>

  <p class="foot"><span data-i18n="foot.signature">⚽ Piłkarzyki na kartce · Seweryn Chorzewski</span> · <span id="appVer">v?</span></p>
</div>

<script src="version.js"></script>
<script>
"use strict";
// ---------- geometria boiska ----------
const W=8, H=10, gL=3, gR=5;           // boisko 8x10 oczek, bramka 2 oczka szeroka
const CENTER=[4,5];
const cell=54, padX=46, padY=30;
const sx=x=>padX+x*cell, sy=y=>padY+(y+1)*cell;
const svgW=padX*2+W*cell, svgH=padY*2+(H+2)*cell;

function ek(a,b){const ka=a[0]+","+a[1],kb=b[0]+","+b[1];return ka<kb?ka+"|"+kb:kb+"|"+ka;}
const isPitch=(x,y)=>x>=0&&x<=W&&y>=0&&y<=H;
const isTopGoal=m=>m[1]===-1&&m[0]>=gL&&m[0]<=gR;
const isBotGoal=m=>m[1]===H+1&&m[0]>=gL&&m[0]<=gR;
const isNode=(x,y)=>isPitch(x,y)||isTopGoal([x,y])||isBotGoal([x,y]);
function inRegion(px,py){
  if(px>=0&&px<=W&&py>=0&&py<=H)return true;
  if(px>=gL&&px<=gR&&py>=-1&&py<=0)return true;
  if(px>=gL&&px<=gR&&py>=H&&py<=H+1)return true;
  return false;
}
const FENCE=new Set();
(function(){
  const pts=[[0,0],[gL,0],[gL,-1],[gR,-1],[gR,0],[W,0],[W,H],[gR,H],[gR,H+1],[gL,H+1],[gL,H],[0,H],[0,0]];
  for(let i=0;i<pts.length-1;i++){
    let [x1,y1]=pts[i],[x2,y2]=pts[i+1];
    const dx=Math.sign(x2-x1),dy=Math.sign(y2-y1);
    let x=x1,y=y1;
    while(x!==x2||y!==y2){const nx=x+dx,ny=y+dy;FENCE.add(ek([x,y],[nx,ny]));x=nx;y=ny;}
  }
})();
// wszystkie kropki do narysowania
const NODES=[];
for(let y=0;y<=H;y++)for(let x=0;x<=W;x++)NODES.push([x,y]);
for(let x=gL;x<=gR;x++){NODES.push([x,-1]);NODES.push([x,H+1]);}

function legalMoves(ball,used){
  const [cx,cy]=ball,res=[];
  for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
    if(!dx&&!dy)continue;
    const nx=cx+dx,ny=cy+dy;
    if(!isNode(nx,ny))continue;
    if(used.has(ek(ball,[nx,ny])))continue;
    if(!inRegion((cx+nx)/2,(cy+ny)/2))continue;
    res.push([nx,ny]);
  }
  return res;
}
function degreeOf(node,used){
  let d=0;const[x,y]=node;
  for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
    if(!dx&&!dy)continue;
    if(used.has(ek(node,[x+dx,y+dy])))d++;
  }
  return d;
}

// ---------- stan gry ----------
let mode="bot", diff="medium", busy=false;
let state, history=[];
function freshState(){
  return {ball:CENTER.slice(),used:new Set(FENCE),edges:[],player:1,winner:0,winReason:null,bounce:false,moves:0,
    startTs:Date.now(),starter:1,recorded:false};
}
function snap(){return{ball:state.ball.slice(),used:new Set(state.used),
  edges:state.edges.map(e=>({a:e.a.slice(),b:e.b.slice(),p:e.p})),
  player:state.player,winner:state.winner,winReason:state.winReason,bounce:state.bounce,moves:state.moves,
  startTs:state.startTs,starter:state.starter,recorded:state.recorded};}
function pushHist(){history.push(snap());if(history.length>250)history.shift();}
function undo(){
  if(busy||!history.length)return;
  const s=history.pop();
  state.ball=s.ball;state.used=s.used;state.edges=s.edges;
  state.player=s.player;state.winner=s.winner;state.winReason=s.winReason;state.bounce=s.bounce;state.moves=s.moves;
  state.startTs=s.startTs;state.starter=s.starter;state.recorded=s.recorded;
  render();
}
function newGame(){state=freshState();history=[];busy=false;hideEndModal();render();}

function applyMove(m,by){
  const d0=degreeOf(m,state.used);
  state.used.add(ek(state.ball,m));
  state.edges.push({a:state.ball.slice(),b:m.slice(),p:by});
  state.ball=m.slice();
  state.moves++;
  if(isTopGoal(m)){state.winner=1;state.winReason="goal";recordWin(1);buzzSafe("Heavy");return;}
  if(isBotGoal(m)){state.winner=2;state.winReason="goal";recordWin(2);buzzSafe("Heavy");return;}
  const bounce=d0>=1;
  state.bounce=bounce;
  if(bounce) buzzSafe("Light");
  if(!bounce)state.player=by===1?2:1;
  if(legalMoves(state.ball,state.used).length===0){   // brak ruchu = przegrana
    state.winner=state.player===1?2:1;
    state.winReason="block";
    recordWin(state.winner);
    buzzSafe("Heavy");
  }
}
function buzzSafe(s){ if(window.__buzz) window.__buzz(s); }

// ---------- bot ----------
function canScore(ball,used,wantTop,depth,cnt){
  if(cnt.n++>4500||depth<=0)return false;
  for(const m of legalMoves(ball,used)){
    if(wantTop&&isTopGoal(m))return true;
    if(!wantTop&&isBotGoal(m))return true;
    if(degreeOf(m,used)>=1){            // odbicie -> ten sam gracz kontynuuje
      const e=ek(ball,m);used.add(e);
      const r=canScore(m,used,wantTop,depth-1,cnt);
      used.delete(e);
      if(r)return true;
    }
  }
  return false;
}
// czy bot ma w aktualnej turze (po łańcuchu odbić) wygraną?
function botHasWinningChain(ball,used,depth,cnt){
  if(cnt.n++>6000||depth<=0)return false;
  for(const m of legalMoves(ball,used)){
    if(isBotGoal(m))return true;
    if(isTopGoal(m))continue;
    if(degreeOf(m,used)>=1){
      const e=ek(ball,m);used.add(e);
      const r=botHasWinningChain(m,used,depth-1,cnt);
      used.delete(e);
      if(r)return true;
    }
  }
  return false;
}
function botPick(){
  const legal=legalMoves(state.ball,state.used);
  const searchDepth = diff==="hard"?18 : diff==="medium"?13 : 6;
  const searchBudget = diff==="hard"?9000 : 5000;
  let best=null,bs=-Infinity;
  for(const m of legal){
    let s;
    if(isBotGoal(m)) s=1e12;                 // wygrana teraz
    else if(isTopGoal(m)) s=-1e12;           // gol samobójczy
    else{
      const bounce=degreeOf(m,state.used)>=1;
      s = m[1]*100 - Math.abs(m[0]-4)*12;     // bliżej dolnej bramki + środek
      if(bounce) s += 300;                    // odbicia = dodatkowe ruchy

      if(diff!=="easy"){                      // nie oddawaj gola rywalowi
        const u=new Set(state.used);u.add(ek(state.ball,m));
        if(!bounce && canScore(m,u,true,searchDepth,{n:0})) s -= 1e9;

        // TRUDNY: sprawdź czy MY mamy łańcuch wygrywający z tego pola
        if(diff==="hard" && bounce){
          if(botHasWinningChain(m,u,searchDepth,{n:0})) s += 5e11;
        }
      }
      const noise = diff==="easy"?60 : diff==="hard"?2 : 8;
      s += Math.random()*noise;
    }
    if(s>bs){bs=s;best=m;}
  }
  return best;
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function botTurn(){
  busy=true;render();
  let guard=0;
  while(mode==="bot"&&state.player===2&&!state.winner&&guard++<60){
    await sleep(430);
    const m=botPick();
    if(!m)break;
    pushHist();applyMove(m,2);render();
  }
  busy=false;render();
}

// ---------- render ----------
const SVG="http://www.w3.org/2000/svg";
const board=document.getElementById("board");
board.setAttribute("viewBox",`0 0 ${svgW} ${svgH}`);
function el(tag,attrs){const e=document.createElementNS(SVG,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

function drawStatic(){
  board.innerHTML="";
  board.appendChild(el("rect",{x:0,y:0,width:svgW,height:svgH,fill:"var(--paper)"}));
  // siatka kratki
  const g=el("g",{stroke:"var(--grid)","stroke-width":1});
  for(let x=0;x*cell<svgW;x++)g.appendChild(el("line",{x1:x*cell+padX%cell,y1:0,x2:x*cell+padX%cell,y2:svgH}));
  for(let y=0;y*cell<svgH;y++)g.appendChild(el("line",{x1:0,y1:y*cell+padY%cell,x2:svgW,y2:y*cell+padY%cell}));
  board.appendChild(g);
  // czerwony margines
  board.appendChild(el("line",{x1:20,y1:0,x2:20,y2:svgH,stroke:"var(--margin)","stroke-width":1.4,opacity:.7}));
  // banda
  const pts=[[0,0],[gL,0],[gL,-1],[gR,-1],[gR,0],[W,0],[W,H],[gR,H],[gR,H+1],[gL,H+1],[gL,H],[0,H],[0,0]];
  const d=pts.map((p,i)=>(i?"L":"M")+sx(p[0])+" "+sy(p[1])).join(" ");
  board.appendChild(el("path",{d,fill:"none",stroke:"var(--ink)","stroke-width":4,
    "stroke-linejoin":"round","stroke-linecap":"round"}));
  // kropki
  const dots=el("g",{fill:"var(--dot)"});
  for(const[x,y]of NODES)dots.appendChild(el("circle",{cx:sx(x),cy:sy(y),r:3.4}));
  board.appendChild(dots);
  // warstwy dynamiczne
  board.appendChild(el("g",{id:"gEdges","stroke-linecap":"round"}));
  board.appendChild(el("g",{id:"gBall"}));
  board.appendChild(el("g",{id:"gTargets"}));
}
function render(){
  if(!board.querySelector("#gEdges"))drawStatic();
  const gE=board.querySelector("#gEdges"),gB=board.querySelector("#gBall"),gT=board.querySelector("#gTargets");
  gE.innerHTML="";gB.innerHTML="";gT.innerHTML="";
  state.edges.forEach((e,i)=>{
    const last=i===state.edges.length-1;
    gE.appendChild(el("line",{x1:sx(e.a[0]),y1:sy(e.a[1]),x2:sx(e.b[0]),y2:sy(e.b[1]),
      stroke:last?"var(--ball)":(e.p===1?"var(--ink)":"var(--ink2)"),
      "stroke-width":last?5:3.5}));
  });
  // piłka
  gB.appendChild(el("circle",{cx:sx(state.ball[0]),cy:sy(state.ball[1]),r:10.5,
    fill:"var(--ball)",stroke:"var(--ball-ring)","stroke-width":3}));
  // ruchy gracza
  const humanTurn = !state.winner && !busy && (mode==="2p" || state.player===1);
  if(humanTurn){
    for(const m of legalMoves(state.ball,state.used)){
      gT.appendChild(el("circle",{class:"target-ring",cx:sx(m[0]),cy:sy(m[1]),r:13}));
      const hit=el("circle",{class:"hit",cx:sx(m[0]),cy:sy(m[1]),r:20});
      hit.addEventListener("click",()=>onTarget(m));
      gT.appendChild(hit);
    }
  }
  updateStatus();
}
function updateStatus(){
  const chip=document.getElementById("turnChip"),txt=document.getElementById("turnText");
  const tag=document.getElementById("bounceTag"),banner=document.getElementById("banner");
  banner.className="banner";
  const colUp = p => i18n.t(p===1 ? "color.blueUpper" : "color.redUpper");
  const colLow = p => i18n.t(p===1 ? "color.blueLower" : "color.redLower");
  const shortName = p => i18n.t(p===1
    ? (mode==="bot" ? "player.you" : "player.p1")
    : (mode==="bot" ? "player.bot" : "player.p2"));
  if(state.winner){
    const w=state.winner;
    chip.style.background=w===1?"var(--ink)":"var(--ink2)";
    banner.classList.add(w===1?"win1":"win2");
    const reason = i18n.t(state.winReason==="block" ? "status.reasonBlock" : "status.reasonGoal");
    banner.textContent = i18n.t("status.bannerWin", {color: colUp(w), name: shortName(w), reason});
    txt.textContent = i18n.t("status.gameOver");
    tag.classList.remove("show");
    return;
  }
  const p=state.player;
  chip.style.background=p===1?"var(--ink)":"var(--ink2)";
  const who = p===1
    ? i18n.t(mode==="bot" ? "player.you" : "player.p1")
    : i18n.t(mode==="bot" ? "player.botThinking" : "player.p2");
  const goal = i18n.t(p===1 ? "goal.upper" : "goal.lower");
  txt.textContent = i18n.t("status.turn", {who, color: colLow(p), goal});
  tag.classList.toggle("show", state.bounce);
}

function onTarget(m){
  if(busy||state.winner)return;
  pushHist();
  applyMove(m,state.player);
  render();
  if(mode==="bot"&&state.player===2&&!state.winner)botTurn();
}

// ---------- UI ----------
document.getElementById("modeSeg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  mode=b.dataset.mode;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle("on",c===b));
  document.getElementById("diffGroup").style.display=mode==="bot"?"":"none";
  renderScore();
  newGame();
});

// settings popover — toggle + zamykanie klikiem poza
const settingsBtn = document.getElementById("settingsBtn");
const settingsPop = document.getElementById("settingsPop");
settingsBtn.addEventListener("click",e=>{
  e.stopPropagation();
  const open = settingsPop.classList.toggle("open");
  settingsBtn.classList.toggle("on", open);
  settingsBtn.setAttribute("aria-expanded", open ? "true" : "false");
});
document.addEventListener("click",e=>{
  if(!settingsPop.classList.contains("open"))return;
  if(settingsPop.contains(e.target)||settingsBtn.contains(e.target))return;
  settingsPop.classList.remove("open");
  settingsBtn.classList.remove("on");
  settingsBtn.setAttribute("aria-expanded","false");
});
document.getElementById("diffSeg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  diff=b.dataset.diff;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle("on",c===b));
  newGame();
});
document.getElementById("newBtn").addEventListener("click",newGame);
document.getElementById("undoBtn").addEventListener("click",undo);
document.getElementById("scoreReset").addEventListener("click",()=>{
  score={bot:{p1:0,p2:0},"2p":{p1:0,p2:0}};
  saveScore();renderScore();
});
document.getElementById("endRematch").addEventListener("click",newGame);
document.getElementById("endClose").addEventListener("click",hideEndModal);

// ---------- wynik (localStorage) ----------
let score = loadScore();
function loadScore(){
  try{ return JSON.parse(localStorage.getItem("pilkarzyki.score")) || {bot:{p1:0,p2:0},"2p":{p1:0,p2:0}}; }
  catch(e){ return {bot:{p1:0,p2:0},"2p":{p1:0,p2:0}}; }
}
function saveScore(){
  try{ localStorage.setItem("pilkarzyki.score", JSON.stringify(score)); }catch(e){}
}
function recordWin(p){
  const b = score[mode] || (score[mode]={p1:0,p2:0});
  if(p===1) b.p1++; else b.p2++;
  saveScore();renderScore();
  // trwała historia gier (storage.js) — raz na grę, nawet jeśli renderowane wielokrotnie
  if(state && !state.recorded && window.storage){
    state.recorded = true;
    storage.saveGameRecord({
      mode,
      difficulty: mode==="bot" ? diff : null,
      winner: p,
      reason: state.winReason || "goal",
      duration: state.startTs ? Math.round((Date.now()-state.startTs)/1000) : 0,
      meta: { starter: state.starter, moves: state.moves, boardW: W, boardH: H }
    });
  }
  setTimeout(()=>showEndModal(p), 350);
}
function showEndModal(winner){
  if(!state || !state.winner) return;
  const colLow = p => i18n.t(p===1 ? "color.blueLower" : "color.redLower");
  const shortName = p => i18n.t(p===1
    ? (mode==="bot" ? "player.you" : "player.p1")
    : (mode==="bot" ? "player.bot" : "player.p2"));
  const isYou = mode==="bot" && winner===1;
  document.getElementById("endTrophy").textContent = isYou ? "🏆" : (mode==="bot" ? "🤖" : "🏆");
  document.getElementById("endTitle").textContent =
    isYou ? i18n.t("end.titleYouWin")
          : (mode==="bot" ? i18n.t("end.titleBotWin")
                          : i18n.t("end.titleWin", {name: shortName(winner)}));
  document.getElementById("endSub").textContent =
    i18n.t(state.winReason==="block" ? "end.subBlock" : "end.subGoal")
    + i18n.t("end.subPlayer", {color: colLow(winner)});
  const b = score[mode]||{p1:0,p2:0};
  document.getElementById("endScore1").textContent = b.p1;
  document.getElementById("endScore2").textContent = b.p2;
  document.getElementById("endLbl1").textContent = i18n.t(mode==="bot" ? "player.you" : "player.p1");
  document.getElementById("endLbl2").textContent = i18n.t(mode==="bot" ? "player.bot" : "player.p2");
  document.getElementById("endModal").hidden = false;
}
function hideEndModal(){ document.getElementById("endModal").hidden = true; }
function renderScore(){
  const b = score[mode] || {p1:0,p2:0};
  document.getElementById("score1").textContent = b.p1;
  document.getElementById("score2").textContent = b.p2;
}
renderScore();

// wyświetl wersję w stopce
(function(){
  const el = document.getElementById("appVer");
  if(el && window.APP_VERSION) el.textContent = "v" + window.APP_VERSION;
})();

// ---------- i18n: language switcher + reactivity ----------
function markActiveLang(){
  const cur = i18n.getLanguage();
  document.querySelectorAll("#langSeg button").forEach(b=>{
    b.classList.toggle("on", b.dataset.lang === cur);
  });
  document.title = i18n.t("app.title");
}
document.getElementById("langSeg").addEventListener("click", async e=>{
  const b = e.target.closest("button[data-lang]");
  if(!b) return;
  await i18n.setLanguage(b.dataset.lang);
  // zsynchronizuj wybór języka do profilu gracza (pod chmurę)
  if(window.storage) storage.updateProfile({ language: b.dataset.lang });
});
i18n.onChange(()=>{
  markActiveLang();
  renderScore();
  if(state) updateStatus();
});

// start gry — dopiero gdy słownik i dane gracza załadowane
Promise.all([i18n.ready, window.storage ? storage.ready : Promise.resolve()]).then(()=>{
  i18n.applyTranslations();
  markActiveLang();
  newGame();
});

// rejestracja service workera (tylko w przeglądarce po http/https; w apce Capacitora pomijamy)
const isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
if(!isNative && "serviceWorker" in navigator && location.protocol.startsWith("http")){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

// ---------- integracja natywna (Android via Capacitor) ----------
// 1) UMP — zgoda RODO (wymagana w EOG/UK/CH; poza tym natychmiast resolvuje).
// 2) AdMob.initialize — dopiero PO uzyskaniu zgody.
// 3) Banner ADAPTIVE u dołu ekranu.
// Tryb testowy zostaje TRUE aż do buildu produkcyjnego — klikanie własnych
// prawdziwych reklam = blokada konta AdMob.
const AD_UNIT_BANNER = "ca-app-pub-9793821286854398/6982945977"; // Socker_baner
const AD_TESTING = true; // przed releasem → false

async function requestConsent(AdMob){
  // UMP — User Messaging Platform; metody dostępne w @capacitor-community/admob 6.x.
  try{
    const info = await AdMob.requestConsentInfo({
      // tester: traktuj urządzenie jako EOG, żeby zobaczyć formularz w developmencie
      debugGeography: AD_TESTING ? "EEA" : "DISABLED",
      testDeviceIdentifiers: []
    });
    // Status: NOT_REQUIRED | REQUIRED | OBTAINED | UNKNOWN
    if(info && (info.isConsentFormAvailable || info.status === "REQUIRED")){
      await AdMob.showConsentForm();
    }
  }catch(e){
    // Brak UMP w starszych wersjach pluginu albo brak sieci — idziemy dalej.
    // AdMob i tak serwuje wtedy reklamy niespersonalizowane.
    console.warn("UMP consent flow skipped:", e && e.message);
  }
}

async function initNative(){
  if(!isNative || !window.Capacitor.Plugins) return;
  const { AdMob } = window.Capacitor.Plugins;
  if(!AdMob) return;
  try{
    await requestConsent(AdMob);
    await AdMob.initialize({ initializeForTesting: AD_TESTING });
    await AdMob.showBanner({
      adId: AD_UNIT_BANNER,
      adSize: "ADAPTIVE_BANNER",
      position: "BOTTOM_CENTER",
      margin: 0,
      isTesting: AD_TESTING
    });
  }catch(e){ console.warn("AdMob init failed", e); }
}
async function buzz(style){
  if(!isNative) return;
  const { Haptics } = window.Capacitor.Plugins || {};
  if(!Haptics) return;
  try{ await Haptics.impact({ style: style || "Light" }); }catch(e){}
}
window.__buzz = buzz;
window.addEventListener("load", initNative);

// Przycisk "Ustawienia prywatności" — widoczny tylko w apce natywnej.
if(isNative){
  const p = document.getElementById("privacyPanel");
  if(p) p.style.display = "";
  const btn = document.getElementById("privacyBtn");
  if(btn) btn.addEventListener("click", async ()=>{
    const { AdMob } = (window.Capacitor && window.Capacitor.Plugins) || {};
    if(!AdMob) return;
    try{
      // Reset zgody → użytkownik zobaczy formularz UMP ponownie
      if(AdMob.resetConsentInfo) await AdMob.resetConsentInfo();
      await requestConsent(AdMob);
    }catch(e){ console.warn("privacy reopen failed", e); }
  });
}
</script>
