<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBF8EC"/>
      <stop offset="1" stop-color="#F4EEDB"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- siatka kratki -->
  <g stroke="#cfe0ef" stroke-width="1.5" opacity="0.8">
    <line x1="0"   y1="40"  x2="1024" y2="40"/>
    <line x1="0"   y1="80"  x2="1024" y2="80"/>
    <line x1="0"   y1="120" x2="1024" y2="120"/>
    <line x1="0"   y1="160" x2="1024" y2="160"/>
    <line x1="0"   y1="200" x2="1024" y2="200"/>
    <line x1="0"   y1="240" x2="1024" y2="240"/>
    <line x1="0"   y1="280" x2="1024" y2="280"/>
    <line x1="0"   y1="320" x2="1024" y2="320"/>
    <line x1="0"   y1="360" x2="1024" y2="360"/>
    <line x1="0"   y1="400" x2="1024" y2="400"/>
    <line x1="0"   y1="440" x2="1024" y2="440"/>
    <line x1="0"   y1="480" x2="1024" y2="480"/>
    <line x1="40"  y1="0" x2="40"  y2="500"/>
    <line x1="80"  y1="0" x2="80"  y2="500"/>
    <line x1="120" y1="0" x2="120" y2="500"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="280" y1="0" x2="280" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="360" y1="0" x2="360" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="440" y1="0" x2="440" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="520" y1="0" x2="520" y2="500"/>
    <line x1="560" y1="0" x2="560" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="680" y1="0" x2="680" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
    <line x1="760" y1="0" x2="760" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="840" y1="0" x2="840" y2="500"/>
    <line x1="880" y1="0" x2="880" y2="500"/>
    <line x1="920" y1="0" x2="920" y2="500"/>
    <line x1="960" y1="0" x2="960" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>
  <line x1="32" y1="0" x2="32" y2="500" stroke="#d9594e" stroke-width="2" opacity="0.6"/>

  <!-- lewa strona: nazwa i hasło -->
  <text x="80" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#2e4a7d">⚽ ProStriker</text>
  <text x="80" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#2e4a7d">Piłkarzyki na kartce</text>
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="400" fill="#5b6b85">Klasyczna szkolna gra</text>
  <text x="80" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="400" fill="#5b6b85">w Twoim telefonie</text>

  <!-- bullet pointy -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#23324f">
    <text x="80" y="380">✓ Bot z poziomami trudności</text>
    <text x="80" y="410">✓ 2 graczy na jednym ekranie</text>
    <text x="80" y="440">✓ Online 1v1 — graj ze znajomymi</text>
    <text x="80" y="470">✓ Działa offline</text>
  </g>

  <!-- prawa strona: ilustracja boiska z piłką -->
  <g transform="translate(620, 60)">
    <!-- boisko -->
    <path d="M 60 60 L 140 60 L 140 30 L 240 30 L 240 60 L 320 60
             L 320 320 L 240 320 L 240 350 L 140 350 L 140 320 L 60 320 Z"
          fill="#FBF8EC" stroke="#2e4a7d" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- ślady ruchów -->
    <polyline points="190,190 220,160 200,130 240,110 220,80 260,60"
              fill="none" stroke="#2e4a7d" stroke-width="3.5" stroke-linecap="round"/>
    <polyline points="190,190 160,220 190,250 140,260 170,290"
              fill="none" stroke="#b5532a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- piłka -->
    <circle cx="170" cy="290" r="18" fill="#e8732a" stroke="#a84718" stroke-width="3.5"/>
  </g>
</svg>
