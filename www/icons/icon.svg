<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- tło papier -->
  <rect width="512" height="512" fill="#FBF8EC"/>
  <!-- siatka kratki -->
  <g stroke="#cfe0ef" stroke-width="2" opacity="0.85">
    <g id="grid-v">
      <line x1="32"  y1="0" x2="32"  y2="512"/>
      <line x1="96"  y1="0" x2="96"  y2="512"/>
      <line x1="160" y1="0" x2="160" y2="512"/>
      <line x1="224" y1="0" x2="224" y2="512"/>
      <line x1="288" y1="0" x2="288" y2="512"/>
      <line x1="352" y1="0" x2="352" y2="512"/>
      <line x1="416" y1="0" x2="416" y2="512"/>
      <line x1="480" y1="0" x2="480" y2="512"/>
    </g>
    <g id="grid-h">
      <line x1="0" y1="32"  x2="512" y2="32"/>
      <line x1="0" y1="96"  x2="512" y2="96"/>
      <line x1="0" y1="160" x2="512" y2="160"/>
      <line x1="0" y1="224" x2="512" y2="224"/>
      <line x1="0" y1="288" x2="512" y2="288"/>
      <line x1="0" y1="352" x2="512" y2="352"/>
      <line x1="0" y1="416" x2="512" y2="416"/>
      <line x1="0" y1="480" x2="512" y2="480"/>
    </g>
  </g>
  <!-- czerwony margines -->
  <line x1="20" y1="0" x2="20" y2="512" stroke="#d9594e" stroke-width="3" opacity="0.7"/>

  <!-- boisko (banda) — w stylu obwodu z gry, wycentrowane -->
  <path d="M 96 96 L 192 96 L 192 64 L 320 64 L 320 96 L 416 96
           L 416 416 L 320 416 L 320 448 L 192 448 L 192 416 L 96 416 Z"
        fill="none" stroke="#2e4a7d" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- piłka -->
  <circle cx="256" cy="256" r="42" fill="#e8732a" stroke="#a84718" stroke-width="6"/>
  <!-- ślad ostatniej linii -->
  <line x1="256" y1="256" x2="208" y2="208" stroke="#a84718" stroke-width="8" stroke-linecap="round"/>
</svg>
