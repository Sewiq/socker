# nginx config dla prostriker.online (F0).
#
# Routing:
#   /            → /var/www/landing/index.html (landing marketingowy)
#   /www/        → /var/www/play/ (gra PWA — statyki z socker/www/)
#   /ws          → proxy do mp-server:3000 (WebSocket upgrade)
#   /.well-known/acme-challenge/  → certbot webroot (HTTP-01)
#
# HTTPS wymuszony na wszystkim oprócz challenge'a.

# Mapowanie Upgrade → connection (wymagane dla WebSocket proxy).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# === :80 — HTTP → HTTPS redirect, plus ACME challenge ===
server {
    listen 80;
    listen [::]:80;
    server_name prostriker.online www.prostriker.online;

    # Certbot webroot challenge musi być dostępny po HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Wszystko inne → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# === :443 — HTTPS, główna konfiguracja ===
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name prostriker.online www.prostriker.online;

    # TLS — certyfikaty z certbota (wolumin ./certbot/conf).
    ssl_certificate     /etc/letsencrypt/live/prostriker.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prostriker.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Bezpieczeństwo: HSTS, no-sniff, frame-deny.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limity podstawowe.
    client_max_body_size 1m;

    # === Landing (root) ===
    root /var/www/landing;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /app-ads.txt {
        try_files /app-ads.txt =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # === Gra (statyki z socker/www/) ===
    location /www/ {
        alias /var/www/play/;
        try_files $uri $uri/ /www/index.html;

        # Cache assetów (icons/, landing/, *.svg, *.png, *.css, *.js).
        location ~* \.(png|jpg|jpeg|svg|webp|ico|woff2?|ttf|css|js)$ {
            alias /var/www/play/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            try_files $uri =404;
        }
    }

    # === Multiplayer WebSocket → mp-server:3000 ===
    location /ws {
        proxy_pass http://mp-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WS idle timeout — gra turowa może mieć długie przerwy.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Landing assets (./assets/).
    location /assets/ {
        alias /var/www/landing/assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 404 fallback.
    location / {
        try_files $uri $uri/ =404;
    }
}
